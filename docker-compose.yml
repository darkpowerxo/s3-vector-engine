
services:
  minio:
    image: minio/minio:latest
    container_name: s3vec-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: s3vec-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

  engine:
    build: .
    container_name: s3vec-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: vector-store
      REDIS_URL: redis://redis:6379/0
      SHARD_SIZE: "10000"
      VECTOR_DIMENSIONS: "1024"
      LOG_JSON: "true"
      WORKERS: "1"
      SHARD_ADDRESSES: "shard-0:9051,shard-1:9051,shard-2:9051"
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      shard-0:
        condition: service_started
      shard-1:
        condition: service_started
      shard-2:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - full  # docker compose --profile full up

  shard-0:
    build: .
    container_name: s3vec-shard-0
    restart: unless-stopped
    command: ["shard-server", "--data-dir", "/data", "--port", "9051", "--dim", "1024"]
    ports:
      - "9051:9051"
    volumes:
      - shard-0-data:/data
    deploy:
      resources:
        limits:
          memory: 2G

  shard-1:
    build: .
    container_name: s3vec-shard-1
    restart: unless-stopped
    command: ["shard-server", "--data-dir", "/data", "--port", "9051", "--dim", "1024"]
    ports:
      - "9052:9051"
    volumes:
      - shard-1-data:/data
    deploy:
      resources:
        limits:
          memory: 2G

  shard-2:
    build: .
    container_name: s3vec-shard-2
    restart: unless-stopped
    command: ["shard-server", "--data-dir", "/data", "--port", "9051", "--dim", "1024"]
    ports:
      - "9053:9051"
    volumes:
      - shard-2-data:/data
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  minio-data:
  redis-data:
  shard-0-data:
  shard-1-data:
  shard-2-data:
